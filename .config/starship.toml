palette = "matugen"
add_newline = true
# Pipes ╰─ ╭─
# Powerline symbols                                     
# Wedges 🭧🭒 🭣🭧🭓
# Random noise 🬖🬥🬔🬗
# Cool stuff 󰜥   

# format = """
# $directory $fill $git_branch $cmd_duration
#  $character"""
format = """
$cmd_duration $directory $hostname$username$git_branch$fill$python
  $character"""

[fill]
symbol = ' '
style = 'fg:text_muted'

# Replace the "❯" symbol in the prompt with "➜"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[ ](bold fg:success)"
error_symbol = "[ ](bold fg:error)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
style = "bg:git_bg"
symbol = "󰘬"
truncation_length = 12
truncation_symbol = ""
format = " 󰜥 [](bold fg:git_bg)[$symbol $branch(:$remote_branch)](fg:git_text bg:git_bg)[ ](bold fg:git_bg)"

[git_commit]
commit_hash_length = 4
tag_symbol = " "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[🍒 PICKING](bold red)"

[git_status]
conflicted = " 🏳 "
ahead = " 🏎💨 "
behind = " 😰 "
diverged = " 😵 "
untracked = " 🤷 ‍"
stashed = " 📦 "
modified = " 📝 "
staged = '[++\($count\)](green)'
renamed = " ✍️ "
deleted = " 🗑 "

[hostname]
ssh_only = true
format =  "[•$hostname](bg:user_bg bold fg:user_text)[](bold fg:user_bg)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = '🕙[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:user_bg fg:user_text"
style_root = "red bold"
format = "[](bold fg:user_bg)[$user]($style)[](bold fg:user_bg)"
disabled = false
show_always = true

[directory]
home_symbol = " "
read_only = "  "
style = "bg:dir_bg fg:dir_text"
truncation_length = 2
truncation_symbol = ".../"
format = '[](bold fg:dir_bg)[󰉋 → $path]($style)[](bold fg:dir_bg)'


[directory.substitutions]
"Desktop" = "  "
"Documents" = "  "
"Downloads" = "  "
"Music" = " 󰎈 "
"Pictures" = "  "
"Videos" = "  "
"GitHub" = " 󰊤 "

[cmd_duration]
min_time = 0
format = '[](bold fg:cmd_bg)[󰪢 $duration](bold bg:cmd_bg fg:cmd_text)[](bold fg:cmd_bg)'

[python]
symbol = "󰌠 "
style = "bg:#306998 fg:#FFE873"
format = '[](bold fg:#3776AB)[$symbol$version]($style)[](bold fg:#3776AB)'
pyenv_version_name = false

[battery]
full_symbol = "🔋"
charging_symbol = "⚡"
discharging_symbol = "🔌"

[[battery.display]]
threshold = 30
style = "bold red"

[[battery.display]]
threshold = 70
style = "bold yellow"

[palettes.matugen]
surface = "#4a454e"
surface_bright = "#151218"
text = "#e7e0e8"
text_muted = "#958e99"
success = "#f2b7c2"
error = "#ffb4ab"
cmd_bg = "#523c73"
cmd_text = "#eddcff"
dir_bg = "#4c4357"
dir_text = "#ebddf7"
user_bg = "#d6bbfb"
user_text = "#3b255b"
git_bg = "#653b44"
git_text = "#ffd9df"
