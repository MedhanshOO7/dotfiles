[meta]
name = "Matugen"
description = "System dynamic theme generated by Matugen"
variant = "dark"
inherits = "vicinae-dark"

[colors.core]
accent = "{{colors.primary.default.hex}}"
accent_foreground = "{{colors.on_primary.default.hex}}"
background = "{{colors.background.default.hex}}"
foreground = "{{colors.on_background.default.hex}}"
secondary_background = "{{colors.surface_container_low.default.hex}}"
border = "{{colors.outline_variant.default.hex}}"

[colors.main_window]
border = "{{colors.outline_variant.default.hex}}"
footer = { background = "colors.core.secondary_background" }

[colors.settings_window]
border = "{{colors.outline_variant.default.hex}}"

[colors.accents]
blue = "{{colors.primary.default.hex}}"
green = "{{colors.tertiary.default.hex}}"
magenta = "{{colors.secondary.default.hex}}"
orange = "{{colors.tertiary.default.hex}}"
red = "{{colors.error.default.hex}}"
yellow = "{{colors.secondary.default.hex}}"
cyan = "{{colors.primary.default.hex}}"
purple = "{{colors.secondary.default.hex}}"

[colors.shortcut]
border = "colors.core.border"

[colors.text]
default = "colors.core.foreground"
muted = "{{colors.on_surface_variant.default.hex}}"
danger = "{{colors.error.default.hex}}"
success = "{{colors.tertiary.default.hex}}"
placeholder = "{{colors.outline.default.hex}}"
selection = { background = "{{colors.primary.default.hex}}", foreground = "{{colors.on_primary.default.hex}}" }

[colors.text.links]
default = "{{colors.primary.default.hex}}"
visited = "{{colors.secondary.default.hex}}"

[colors.input]
border = "{{colors.outline_variant.default.hex}}"
border_focus = "{{colors.primary.default.hex}}"
border_error = "{{colors.error.default.hex}}"

[colors.button.primary]
background = "{{colors.surface_container.default.hex}}"
foreground = "{{colors.on_surface.default.hex}}"
hover = { background = "{{colors.surface_container_high.default.hex}}" }
focus = { outline = "colors.core.accent" }

[colors.list.item.hover]
foreground = "{{colors.on_surface.default.hex}}"
secondary_foreground = "{{colors.on_surface_variant.default.hex}}"

[colors.list.item.selection]
background = "{{colors.primary_container.default.hex}}"
foreground = "{{colors.on_primary_container.default.hex}}"
secondary_background = "{{colors.primary_container.default.hex}}"
secondary_foreground = "{{colors.on_primary_container.default.hex}}"

[colors.grid.item]
background = "{{colors.surface_container_low.default.hex}}"
hover = { outline = "{{colors.outline.default.hex}}" }
selection = { outline = "{{colors.primary.default.hex}}" }

[colors.scrollbars]
background = "{{colors.outline_variant.default.hex}}"

[colors.loading]
bar = "{{colors.primary.default.hex}}"
spinner = "{{colors.on_surface.default.hex}}"
