palette = "matugen"
add_newline = true
# Pipes в•°в”Җ в•ӯв”Җ
# Powerline symbols В оӮ° оӮұ оӮІ оӮі оӮҙ оӮө оӮ¶ оӮ· оӮё оӮ№ оӮә оӮ» оӮј оӮҪ оӮҫ оӮҝ оғҖ оғҒ оғӮ оғғ оғ„ оғ… оғҶ оғҮ оғҲ оғҠ  оғҢ оғҚ оғҺ оғҸ оғҗ оғ‘ оғ” оғ’ 
# Wedges рҹӯ§рҹӯ’ рҹӯЈрҹӯ§рҹӯ“
# Random noise рҹ¬–рҹ¬Ҙрҹ¬”рҹ¬—
# Cool stuff у°ңҘ о©ұ пҒӢ пҖҚ

# format = """
# $directory $fill $git_branch $cmd_duration
#  $character"""
format = """
$cmd_duration $directory $hostname$username$git_branch$fill$python
  $character"""

[fill]
symbol = ' '
style = 'fg:text_muted'

# Replace the "вқҜ" symbol in the prompt with "вһң"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[о©ұ пҒӢ](bold fg:success)"
error_symbol = "[пҖҚ пҒӢ](bold fg:error)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
style = "bg:surface"
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""
format = " у°ңҘ [оӮ¶](bold fg:surface)[$symbol $branch(:$remote_branch)](fg:text bg:surface)[оӮҙ ](bold fg:surface)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold red)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++\($count\)](green)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[hostname]
ssh_only = true
format =  "[вҖў$hostname](bg:surface bold fg:text)[оӮҙ](bold fg:surface)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:surface fg:text"
style_root = "red bold"
format = "[оӮ¶](bold fg:surface)[$user]($style)[оӮҙ](bold fg:surface)"
disabled = false
show_always = true

[directory]
home_symbol = "п‘ӯ "
read_only = " п‘– "
style = "bg:surface_bright fg:text"
truncation_length = 2
truncation_symbol = ".../"
format = '[оӮ¶](bold fg:surface_bright)[у°үӢ вҶ’ $path]($style)[оӮҙ](bold fg:surface_bright)'


[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "

[cmd_duration]
min_time = 0
format = '[оӮ¶](bold fg:surface)[у°Әў $duration](bold bg:surface fg:text)[оӮҙ](bold fg:surface)'

[python]
symbol = "у°Ң  "
style = "bg:python_bg fg:python_fg"
format = '[оӮ¶](bold fg:python_bg)[$symbol$version]($style)[оӮҙ](bold fg:python_bg)'
pyenv_version_name = false

[battery]
full_symbol = "рҹ”Ӣ"
charging_symbol = "вҡЎ"
discharging_symbol = "рҹ”Ң"

[[battery.display]]
threshold = 30
style = "bold red"

[[battery.display]]
threshold = 70
style = "bold yellow"

[palettes.matugen]
surface = "{{colors.surface_variant.default.hex}}"
surface_bright = "{{colors.surface.default.hex}}"
text = "{{colors.on_surface.default.hex}}"
text_muted = "{{colors.outline.default.hex}}"
success = "{{colors.tertiary.default.hex}}"
error = "{{colors.error.default.hex}}"
python_bg = "{{colors.secondary.default.hex}}"
python_fg = "{{colors.on_secondary.default.hex}}"
