# Add stuff here
# Use #! to add an extra column on the cheatsheet
# Use ##! to add a section in that column
# Add a comment after a bind to add a description, like above

unbind = Super, W 

#vicinae
bind = ALT, SPACE, exec, vicinae toggle

#alt-tab
bind =  ALT , Tab, exec, snappy-switcher next

unbind = SUPER, Q
bind = SUPER, W, killactive

unbind = Super, B, exec, $browser # Browser
bind = Super, B, exec, $browser # Browser

unbind = Super+Shift, X
unbind = Super+Shift, T

# OCR on T
bind = Super+Shift, T, global, quickshell:regionOcr

# optional: move translate somewhere else instead of killing it
bind = Super+Shift, Y, global, quickshell:screenTranslate

unbind = Super+Shift, R
unbind = Super+Shift+Alt, R

# your new preferred bind
bindl = Super+Shift, R, exec, ~/.config/quickshell/$qsConfig/scripts/videos/record.sh --fullscreen --sound
bindl = SUPER SHIFT ALT, R, exec, ~/.config/quickshell/ii/scripts/videos/record.sh --sound
#fullscreen
bind = Alt, Return, fullscreen, 0

# remove existing binding for Super+O (good: prevents conflict)
unbind = Super,O  

# bind Super+O to launch Obsidian
bind = Super, O, exec, obsidian   # ✔️ opens Obsidian

# remove existing binding for Super+A (was left sidebar)
unbind = Super,A  

# bind Super+A to toggle right sidebar
bindd = Super, A, Toggle right sidebar, global, quickshell:sidebarRightToggle

# remove existing binding for Super+N (right sidebar)
unbind = Super,N   

# reassign left sidebar toggle to Super+Q
bind = Super, Q, global, quickshell:sidebarLeftToggle 
 
#/# bind = Super+Alt, Hash,, # Send to workspace # (1, 2, 3,...)
# We use raw keycodes because some keyboard layouts register number keys as different chars. The codes can be verified with `wev`
unbind = Super+Alt, code:10
unbind = Super+Alt, code:11
unbind = Super+Alt, code:12
unbind = Super+Alt, code:13
unbind = Super+Alt, code:14
unbind = Super+Alt, code:15
unbind = Super+Alt, code:16
unbind = Super+Alt, code:17
unbind = Super+Alt, code:18
unbind = Super+Alt, code:19
# keypad numbers
unbind = Super+Alt, code:87
unbind = Super+Alt, code:88
unbind = Super+Alt, code:89
unbind = Super+Alt, code:83
unbind = Super+Alt, code:84
unbind = Super+Alt, code:85
unbind = Super+Alt, code:79
unbind = Super+Alt, code:80
unbind = Super+Alt, code:81
unbind = Super+Alt, code:90

