# hyprlang noerror false
# Put general config stuff here
# Here's a list of every variable: https://wiki.hyprland.org/Configuring/Variables/

# monitor=,addreserved, 0, 0, 0, 0 # Custom reserved area

# HDMI port: mirror display. To see device name, use `hyprctl monitors`

# NVIDIA + mixed-refresh overrides.
misc {
    # Keep variable frame scheduling enabled so the 165 Hz panel is not paced by
    # the slower external display during normal desktop use.
    vfr = true
}

cursor {
    # Keep cursor-driven updates from dropping to very low refresh behavior.
    min_refresh_rate = 165
}

opengl {
    # Hyprland's NVIDIA-specific flicker mitigation.
    nvidia_anti_flicker = true
}

# Hyprland 0.54.x no longer exposes render:explicit_sync config knobs.
# On current NVIDIA + XWayland stacks, explicit sync is negotiated automatically.

xwayland {
    # Avoid extra scaling work for X11 / Electron apps on fractional scales.
    force_zero_scaling = true
}
