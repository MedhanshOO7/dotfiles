monitor = eDP-1, 2560x1600@165, 1600x0, 1.6
monitor = HDMI-A-1, 1920x1080@75, 0x0, 1.2

# hyprlang noerror false
# Put general config stuff here
# Here's a list of every variable: https://wiki.hyprland.org/Configuring/Variables/

# monitor=,addreserved, 0, 0, 0, 0 # Custom reserved area

# HDMI port: mirror display. To see device name, use `hyprctl monitors`

# NVIDIA + mixed-refresh overrides.
misc {
    # Keep variable frame scheduling enabled so the 165 Hz panel is not paced by
    # the slower external display during normal desktop use.
    vfr = true
}

cursor {
    # Keep cursor-driven updates from dropping to very low refresh behavior.
    min_refresh_rate = 165
}

opengl {
    # Hyprland's NVIDIA-specific flicker mitigation.
    nvidia_anti_flicker = true
}

# Hyprland 0.54.x no longer exposes render:explicit_sync config knobs.
# On current NVIDIA + XWayland stacks, explicit sync is negotiated automatically.

xwayland {
    # Avoid extra scaling work for X11 / Electron apps on fractional scales.
    force_zero_scaling = true
}

decoration {
    # 2 = circle, higher = squircle, 4 = very obvious squircle
    # Clear squircles look really off; we use only extra .4 here to make the rounding feel more continuous
    rounding_power = 2
    rounding = 18

    blur {
        enabled = true
        xray = false
        special = true
        new_optimizations = true

        size = 10
        passes = 4
        brightness = 1.23

        contrast = 1.23
        vibrancy = 0.95
        vibrancy_darkness = 0.5

        popups = true
        popups_ignorealpha = 0.6
        input_methods = true
        input_methods_ignorealpha = 0.8
    }

    shadow {
        enabled = true
        ignore_window = true
        range = 20
        offset = 0 2
        render_power = 10
        color = rgba(00000020)
    }

    # Dim
    dim_inactive = true
    dim_strength = 0.15
    dim_special = 0.2
}

input {
    kb_layout = us
    numlock_by_default = true
    repeat_delay = 250
    repeat_rate = 35

    follow_mouse = 1
    off_window_axis_events = 2

    natural_scroll = no
    accel_profile = adaptive
    sensitivity = 0.2

    touchpad {
        natural_scroll = yes
        disable_while_typing = false
        clickfinger_behavior = true
        scroll_factor = 0.4
    } 
}

device {
    name = microsoft-microsoft®-nano-transceiver-v2.0-mouse
    scroll_factor = 0.7
    natural_scroll =no

}
device {
    name = hs6209-2.4g-wireless-receiver-mouse
    scroll_factor = 0.7
    natural_scroll =  no
}
device {
    name = pixart-lenovo-usb-optical-mouse
    sensitivity = -0.3
    accel_profile = flat
    natural_scroll = no
}
