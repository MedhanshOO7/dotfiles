# ######## Wayland #########
# Tearing
# env = WLR_DRM_NO_ATOMIC, 1
# ?
# env = WLR_NO_HARDWARE_CURSORS, 1

# ######## NVIDIA / Wayland #########
# Force the NVIDIA GBM path instead of legacy EGLStreams/X11 fallbacks.
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# Required for NVIDIA VA-API via libva-nvidia-driver.
env = LIBVA_DRIVER_NAME,nvidia

