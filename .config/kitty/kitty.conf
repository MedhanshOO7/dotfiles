# =================================================================
#  SEXY KITTY CONFIGURATION (Catppuccin Macchiato Edition)
# =================================================================

# --- 1. FONTS ----------------------------------------------------
font_family      FiraCode Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 16.0
disable_ligatures never


# --- 2. CURSOR & ANIMATION ---------------------------------------
# Macchiato Rosewater Cursor
cursor           #f4dbd6
cursor_text_color #24273a

# "Breathing" beam cursor effect
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0.5 ease-in-out

# Smooth trailing effect
#cursor_trail 5 
#cursor_trail_decay 0.4 0.8


# --- 3. WINDOW & LAYOUT (OVERALL ROUNDNESS) ----------------------
remember_window_size  no
initial_window_width  80c
initial_window_height 24c

# Essential for the "sexy" look: High Padding & Margins
window_padding_width 12
window_margin_width 5

# Borders and Neon Glow
window_border_width 1.5pt
draw_minimal_borders yes
active_border_color #b7bdf8
inactive_border_color #494d64

# Hide title bar for a clean, rounded look
hide_window_decorations yes
confirm_os_window_close 0


# --- 4. TRANSPARENCY & BLUR --------------------------------------
background_opacity 0.90
background_blur 1


# --- 5. TAB BAR (ROUNDED STYLE) ----------------------------------
tab_bar_edge            top
tab_bar_align           center
tab_bar_margin_width    10
tab_bar_margin_height   10 0

# Modern Rounded Powerline
tab_bar_style           powerline
tab_powerline_style     round

# Tab Colors (Macchiato)
active_tab_foreground   #181926
active_tab_background   #c6a0f6
active_tab_font_style   bold
inactive_tab_foreground #cad3f5
inactive_tab_background #1e2030
inactive_tab_font_style normal


# --- 6. CATPPUCCIN MACCHIATO COLOR PALETTE -----------------------
foreground            #cad3f5
background            #24273a
selection_foreground  #24273a
selection_background  #f4dbd6
url_color             #f4dbd6

# The 16 terminal colors
# Black
color0 #494d64
color8 #5b6078
# Red
color1 #ed8796
color9 #ed8796
# Green
color2  #a6da95
color10 #a6da95
# Yellow
color3  #eed49f
color11 #eed49f
# Blue
color4  #8aadf4
color12 #8aadf4
# Magenta
color5  #f5bde6
color13 #f5bde6
# Cyan
color6  #8bd5ca
color14 #8bd5ca
# White
color7  #b8c0e0
color15 #a5adcb


# --- 7. KEYBINDINGS & COMMAND PALETTE ----------------------------
# Open Command Palette (VS Code style)

map ctrl+space command_palette

# Reload config
map ctrl+shift+f5 load_config_file
map cmd+,           load_config_file

# Clipboard
map ctrl+c copy_to_clipboard
map ctrl+v paste_from_clipboard

# Silence the bell
enable_audio_bell no
visual_bell_duration 0.0
# =================================================================
