# ╔══════════════════════════════════════════════════════════════════╗
# ║                    kitty.conf — crafted with care               ║
# ╚══════════════════════════════════════════════════════════════════╝
#
#  Philosophy: fast, sharp, readable, beautiful.
#  Every option here is intentional.
#  Last reviewed: 2025
#
# ─────────────────────────────────────────────────────────────────────


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  FONT STACK
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
#  ComicShannsMono Nerd Font Mono gives you a distinctive handwritten-mono
#  aesthetic AND all the powerline / devicon glyphs. Genuinely fun to look at.
#
font_family      ComicShannsMono Nerd Font Mono
bold_font        ComicShannsMono Nerd Font Mono
italic_font      ComicShannsMono Nerd Font Mono
bold_italic_font ComicShannsMono Nerd Font Mono

font_size        16.0

# Sub-pixel rendering — makes glyphs feel chiselled on HiDPI screens
text_composition_strategy         platform

# Ligatures: on. `->`, `=>`, `!=`, `===`, `//`, `/**` all collapse
# into single, satisfying glyphs.
disable_ligatures                 never

# Adjust metrics so the font sits perfectly in its cell
modify_font cell_height           +4px
modify_font baseline              0

# For non-Nerd Font installs, pull icons from a symbol fallback
# symbol_map U+E000-U+F8FF Symbols Nerd Font Mono


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  CATPPUCCIN MOCHA — hand-tuned
#  (deep navy base, pastel accents, easy on the eyes after hour 8)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Core surfaces
background                        #1e1e2e
foreground                        #cdd6f4
selection_background              #585b70
selection_foreground              #cdd6f4

# Cursor — a soft lavender so it's never lost
cursor                            #f5c2e7
cursor_text_color                 #1e1e2e
cursor_shape                      beam
cursor_beam_thickness             1.8
cursor_blink_interval             0.6
cursor_stop_blinking_after        10.0

# URLs look like links, not just text
url_color                         #89b4fa
url_style                         curly

# Marks (triple-click word, bracket highlights)
mark1_background                  #b4befe
mark1_foreground                  #1e1e2e
mark2_background                  #cba6f7
mark2_foreground                  #1e1e2e
mark3_background                  #89dceb
mark3_foreground                  #1e1e2e

# ── Normal palette ──────────────────────────────────────────────────
color0   #45475a    # black   (surface1)
color1   #f38ba8    # red     (red)
color2   #a6e3a1    # green   (green)
color3   #f9e2af    # yellow  (yellow)
color4   #89b4fa    # blue    (blue)
color5   #f5c2e7    # magenta (pink)
color6   #94e2d5    # cyan    (teal)
color7   #bac2de    # white   (subtext1)

# ── Bright palette ───────────────────────────────────────────────────
color8   #585b70    # bright black  (surface2)
color9   #f38ba8    # bright red
color10  #a6e3a1    # bright green
color11  #f9e2af    # bright yellow
color12  #89b4fa    # bright blue
color13  #f5c2e7    # bright magenta
color14  #94e2d5    # bright cyan
color15  #a6adc8    # bright white  (subtext0)


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  WINDOW CHROME & TRANSPARENCY
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Slight transparency — just enough to see wallpaper layers, not
# enough to hurt readability. Set to 1.0 if you prefer opaque.
background_opacity                0.85
background_blur                   1

# No decoration → clean, distraction-free
hide_window_decorations           yes

# Inner padding: give the text room to breathe
window_padding_width              14 18

# The thin border around each split pane
active_border_color               #cba6f7
inactive_border_color             #313244
bell_border_color                 #f9e2af

# Margin between panes
window_margin_width               2

# Resize without stuttering
resize_debounce_time              0.05


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  TABS — styled like a minimal status bar
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

tab_bar_edge                      bottom
tab_bar_style                     powerline
tab_powerline_style               slanted
tab_bar_min_tabs                  1
tab_bar_margin_width              0.0
tab_bar_margin_height             0.0 0.0

# Active tab: lavender background, deep text
active_tab_background             #b4befe
active_tab_foreground             #1e1e2e
active_tab_font_style             bold

# Inactive: muted, unobtrusive
inactive_tab_background           #313244
inactive_tab_foreground           #6c7086
inactive_tab_font_style           normal

tab_bar_background                #181825
tab_bar_margin_color              #181825

# What to show in each tab title
tab_title_template                " {index}: {title} "
active_tab_title_template         " {index}: {title} "


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  SCROLLBACK & PERFORMANCE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

scrollback_lines                  10000
scrollback_pager                  less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# Wheel scroll speed — feels natural, not sluggish
wheel_scroll_multiplier           5.0
wheel_scroll_min_lines            1
touch_scroll_multiplier           1.0

# repaint_delay: how often kitty polls for output (ms).
# 8 ms ≈ 120 fps — lower if you have a 144 Hz display.
repaint_delay                     8
input_delay                       1
sync_to_monitor                   yes


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  MOUSE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

mouse_hide_wait                   2.0
click_interval                    0.5
focus_follows_mouse               no

# Copy to clipboard on select (middle-click pastes on Linux)
# copy_on_select                    clipboard
#

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  BELL — silence is golden
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

enable_audio_bell                 no
visual_bell_duration              0.1
visual_bell_color                 #f9e2af


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  SHELL INTEGRATION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
#  Enables: semantic zones, OSC 7 cwd tracking, automatic title,
#  prompt marking (jump between prompts with ctrl+shift+z/x)
#
shell_integration                 enabled
allow_remote_control              yes
listen_on                         unix:/tmp/kitty


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  KEYBINDINGS — sensible, muscle-memory-friendly
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Wipe all defaults and build from scratch
clear_all_shortcuts               yes

# ── Clipboard ────────────────────────────────────────────────────────
map ctrl+shift+c                  copy_to_clipboard
map ctrl+shift+v                  paste_from_clipboard
map ctrl+shift+s                  paste_from_selection

# ── Font size on the fly ─────────────────────────────────────────────
map ctrl+shift+equal                    change_font_size all +1.0
map ctrl+shift+minus                    change_font_size all -1.0
map ctrl+shift+backspace          change_font_size all 0

# ── Tabs ─────────────────────────────────────────────────────────────
map ctrl+shift+t                  new_tab_with_cwd
map ctrl+shift+w                  close_tab
map ctrl+shift+right              next_tab
map ctrl+shift+left               previous_tab
map ctrl+shift+l                  next_tab
map ctrl+shift+h                  previous_tab
map ctrl+shift+.                  move_tab_forward
map ctrl+shift+,                  move_tab_backward

# Alt+1-9: jump to tab by index
map alt+1                         goto_tab 1
map alt+2                         goto_tab 2
map alt+3                         goto_tab 3
map alt+4                         goto_tab 4
map alt+5                         goto_tab 5
map alt+6                         goto_tab 6
map alt+7                         goto_tab 7
map alt+8                         goto_tab 8
map alt+9                         goto_tab 9

# ── Splits / windows ─────────────────────────────────────────────────
map ctrl+shift+enter              new_window_with_cwd
map ctrl+shift+d                  close_window
map ctrl+shift+]                  next_window
map ctrl+shift+[                  previous_window

# Resize active pane
map ctrl+shift+r                  start_resizing_window

# Move focus with alt+arrows (works great with tmux too)
map alt+left                      neighboring_window left
map alt+right                     neighboring_window right
map alt+up                        neighboring_window up
map alt+down                      neighboring_window down

# Layouts: cycle with ctrl+shift+space
map ctrl+shift+space              next_layout

# ── Scrollback ───────────────────────────────────────────────────────
map ctrl+shift+k                  scroll_line_up
map ctrl+shift+j                  scroll_line_down
map ctrl+shift+page_up            scroll_page_up
map ctrl+shift+page_down          scroll_page_down
map ctrl+shift+home               scroll_home
map ctrl+shift+end                scroll_end
map ctrl+shift+z                  scroll_to_prompt -1
map ctrl+shift+x                  scroll_to_prompt 1

# Open scrollback in $PAGER
map ctrl+shift+g                  show_scrollback

# ── Misc ─────────────────────────────────────────────────────────────
map ctrl+shift+f                  show_kitty_env_vars
map ctrl+shift+u                  kitten unicode_input
map ctrl+shift+e                  kitten hints
map ctrl+shift+p>f                kitten hints --type path --program -
map ctrl+shift+p>l                kitten hints --type line --program -
map ctrl+shift+p>w                kitten hints --type word --program @

# Edit this config and reload instantly
map ctrl+shift+i                  edit_config_file
map ctrl+shift+o                  load_config_file


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  LAYOUTS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
#  Cycle order: tall (code left, terminal right) → fat (code on top)
#  → grid (4-up) → stack (full-screen one pane at a time).
#
enabled_layouts                   tall,fat,grid,stack


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  ADVANCED
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Confirm before closing a window with a running process
confirm_os_window_close           1

# Open new tabs/windows in the same working directory
# (handled per-binding above with _with_cwd variants)

# Hyperlinks in output (OSC 8) — click to open in browser
open_url_with                     default
detect_urls                       yes

# Image protocol support (for tools like `timg`, `viu`, `chafa`)
allow_hyperlinks                  yes

# Startup session (optional — uncomment to use)
# startup_session                 ~/.config/kitty/startup.session

# Default shell
shell                             .

# Editor for kitty's own prompts
editor                            .

# ─────────────────────────────────────────────────────────────────────
# END OF CONFIG
# ─────────────────────────────────────────────────────────────────────
