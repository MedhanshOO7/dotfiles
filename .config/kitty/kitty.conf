# ================================================================
# Kitty Profile
# Clean Catppuccin setup with readable spacing and practical defaults.
# ================================================================

# Theme
include ./dark-theme.auto.conf

# Fonts
# font_family      JetBrainsMono NFM
# bold_font        auto
# italic_font      auto
# bold_italic_font auto
font_size        16.0
disable_ligatures never

# Cursor and rendering
cursor_shape               block
cursor_blink_interval      0.35
cursor_stop_blinking_after 0
repaint_delay              8
input_delay                2
shell_integration          enabled

# Window sizing and spacing
remember_window_size  no
initial_window_width  100c
initial_window_height 30c
window_padding_width  12
window_margin_width   4
window_border_width   1.5pt
draw_minimal_borders  yes
hide_window_decorations yes
confirm_os_window_close 1

# Background treatment
background_opacity 0.88
background_blur    0
inactive_text_alpha 0.85

# Scrolling
scrollback_lines         10000
wheel_scroll_multiplier  5.0

# Selection and URL behavior
copy_on_select           clipboard
strip_trailing_spaces    smart
open_url_with            default

# Tabs
tab_bar_edge           top
tab_bar_style          separator
tab_bar_align          left
tab_bar_min_tabs       2
tab_bar_margin_width   10
tab_bar_margin_height  10 0
tab_separator          "  "
active_tab_font_style  bold
inactive_tab_font_style normal

# Bell
enable_audio_bell   no
visual_bell_duration 0.0

# Keybindings
map ctrl+space    command_palette
map ctrl+shift+f5 load_config_file
map cmd+,         load_config_file
map ctrl+c        copy_to_clipboard
map ctrl+v        paste_from_clipboard


# BEGIN_KITTY_FONTS
font_family      family="ComicShannsMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
